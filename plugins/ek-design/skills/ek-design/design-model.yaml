  agent_status_badge:
    purpose: "Inline agent state indicator — runs everywhere agents render"
    base:
      display: "inline-flex"
      align: "center"
      gap: "{spacing.xs}"
      padding: "2px 8px"
      border: "1px solid currentColor"
      radius: "{radii.pill}"
      font_family: "JetBrains Mono"
      font_weight: 500
      font_size: "0.6875rem"
      text_transform: "uppercase"
      letter_spacing: "0.060em"
    variants:
      idle:              { color: "{slate.500}" }
      thinking:          { color: "{cyan.500}", animation: "pulse 1.5s ease-in-out infinite" }
      tool:              { color: "{steel_violet.300}" }
      command_active:    { color: "{magenta.500}", box_shadow: "{effects.neon_glow_magenta}" }
      blocked:           { color: "{amber.500}" }
      approval_required: { color: "{amber.500}", border: "1px dashed currentColor" }
      complete:          { color: "{lime.500}" }
      active:            { color: "{lime.500}", box_shadow: "{effects.neon_glow_lime}" }
      error:             { color: "{red.500}" }

  data_freshness_badge:
    purpose: "Per-source sync state indicator"
    base:
      display: "inline-flex"
      align: "center"
      gap: "4px"
      padding: "1px 6px"
      border: "1px solid currentColor"
      radius: "{radii.pill}"
      font_family: "JetBrains Mono"
      font_size: "0.625rem"
      text_transform: "uppercase"
      letter_spacing: "0.060em"
    variants:
      live:              { color: "{lime.500}" }
      synced:            { color: "{cyan.500}" }
      stale:             { color: "{amber.500}" }
      failed:            { color: "{red.500}" }
      manual_override:   { color: "{magenta.500}" }

  source_trace_row:
    purpose: "One row per source — system / table / last sync / owner / confidence / drill-through"
    background: "transparent"
    border_bottom: "1px solid {neutral.800}"
    padding: "{spacing.sm} 0"
    columns:
      source_system: { font_family: "JetBrains Mono", color: "{cyan.500}", font_size: "0.8125rem" }
      object:        { font_family: "JetBrains Mono", color: "{neutral.300}", font_size: "0.8125rem" }
      last_sync:     { type: "timestamp" }
      owner:         { type: "small" }
      confidence:    { type: "delta" }
      drill_through: { color: "{cyan.500}", icon: "external-link" }

  variance_row:
    purpose: "Actual / Budget / Forecast / Variance$ / Variance% / Materiality / Agent recommendation"
    background: "transparent"
    border_bottom: "1px solid {neutral.800}"
    padding: "{spacing.sm} 0"
    font_family: "JetBrains Mono"
    tabular_numerals: true
    columns:
      label:        { type: "small" }
      actual:       { type: "table_numeric" }
      budget:       { type: "table_numeric", color: "{neutral.500}" }
      forecast:     { type: "table_numeric", color: "{neutral.300}" }
      variance_dollar: { type: "table_numeric", color_gain: "{finance.gain}", color_loss: "{finance.loss}" }
      variance_pct: { type: "delta", color_gain: "{finance.gain}", color_loss: "{finance.loss}" }
      materiality:  { type: "agent_status_badge" }
      agent_recommendation: { font_family: "Inter", color: "{magenta.500}", icon: "sparkle" }

  approval_card:
    purpose: "Agent-proposed model change: evidence / impact / approve / reject / inspect"
    background: "{neutral.850}"
    border:     "1px dashed {amber.500}"           # dashed signals "pending decision"
    radius:     "{radii.component}"
    padding:    "{spacing.md}"
    header:     { color: "{amber.500}", font_family: "Chakra Petch", font_weight: 600, text_transform: "uppercase", letter_spacing: "0.080em", font_size: "0.7rem" }
    evidence:   { background: "{neutral.900}", border: "1px solid {cyan.700}", color: "{cyan.500}", font_family: "JetBrains Mono" }
    impact:     { font_family: "JetBrains Mono", color_gain: "{finance.gain}", color_loss: "{finance.loss}" }
    actions:
      approve:  { background: "{magenta.500}", color: "{neutral.0}" }
      reject:   { background: "transparent", color: "{red.500}", border: "1px solid {red.500}" }
      inspect:  { background: "transparent", color: "{cyan.500}", border: "1px solid {cyan.500}" }

  agent_log:
    purpose: "Timestamped feed of tool calls / sync events / approvals — terminal-inset styling"
    inherits: "terminal_block"
    timestamp_color: "{neutral.500}"
    event_types:
      tool_use:          { color: "{steel_violet.300}", icon: "wrench" }
      sync:              { color: "{cyan.500}", icon: "refresh-cw" }
      approval_request:  { color: "{amber.500}", icon: "alert-circle" }
      approval_granted:  { color: "{lime.500}", icon: "check" }
      command:           { color: "{magenta.500}", icon: "play" }
      error:             { color: "{red.500}", icon: "x-circle" }

  board_export_preview:
    purpose: "Reduced-neon preview of how a dashboard exports to board-safe PDF"
    background: "{neutral.950}"
    body_class: "board-safe"           # activates board-safe effect overrides
    panel: "{components.finance_panel}"
    overrides:
      glow: "none"
      scanline: "none"
      animation: "none"
      focus_ring: "{effects.board_safe_focus_ring}"

# ────────────────────────────────────────────────────────────────────
# VOICE
# ────────────────────────────────────────────────────────────────────
voice:
  register: "agentic, operator-respecting, terminal-native, finance-literate"
  do:
    - "Treat the user as the operator — surface state plainly (model, agent ID, latency, token count, cost)"
    - "Use mono for any identifier (file paths, IDs, timestamps, model names, hashes, period codes)"
    - "Use tabular numerals for any finance number (KPIs, variance, tables, charts)"
    - "Prefer concrete metrics over hype ('212ms', '4.2k tokens', '$1.2M ARR' beats 'fast' / 'growing')"
    - "Surface source freshness explicitly: 'synced 12s ago' / 'stale (last sync 4d ago)'"
    - "Terminal-style timestamps where appropriate (ISO-8601 or HH:MM:SS.mmm)"
    - "Direct verbs in commands ('Run forecast', 'Approve', 'Investigate variance', 'Reconcile source', 'Generate board memo' — not 'Get Started', not 'Begin Your Journey')"
    - "Density is fine — the operator wants information, not whitespace"
  avoid:
    - "Em-dashes (use colon, parens, comma, or n-dash)"   # ★ v0.2
    - "Consumer-SaaS verbs ('delight', 'magic', 'effortless', 'unlock', 'empower')"
    - "AI-hype clichés ('powered by AI', 'AI-first', 'intelligent', 'smart')"
    - "Generic startup grandiosity ('transform', 'revolutionize', 'reimagine')"
    - "Lorem ipsum — use real ek/cepsra content or honest placeholders"
    - "Faux-handwritten signatures or 'made with ❤️' footer copy"
    - "Decorative emoji in UI (functional emoji in user-authored content is fine)"
    - "Cyberpunk cosplay vocabulary ('jacked in', 'the matrix', 'neural') — the brand is visually cyberpunk; the copy stays grounded"

# ────────────────────────────────────────────────────────────────────
# AVOID — Data-driven rules consumed by ek-craft
# v0.2 expansions appended.
# ────────────────────────────────────────────────────────────────────
avoid:
  # Consumer-AI-default colors
  - color: "#6366F1"
    name: "Tailwind Indigo 500"
    reason: "Generic AI-default palette — every Tailwind starter app uses this. The single most-overused color in 2024-2026 AI products. ek's steel_violet ramp is the differentiated atmospheric purple-blue."
    severity: "error"
  - color: "#8B5CF6"
    name: "Tailwind Violet 500"
    reason: "Same family as #6366F1 — consumer-SaaS-purple cliché."
    severity: "error"
  - color: "#A78BFA"
    name: "Tailwind Violet 400"
    reason: "Pastel-violet — wrong register for cyberpunk + AI-default."
    severity: "error"
  - color_family: "trust-gradient"
    description: "Purple-to-pink gradient backgrounds (#6366F1 → #EC4899 and similar)."
    reason: "Quintessential AI-slop visual. Reads as marketing-template-purchased."
    severity: "error"
  - color_family: "pastel-tints"
    description: "Any color with saturation < 30% AND lightness > 75%."
    reason: "Pastels are off-register for cyberpunk. ek uses saturated neons on near-black."
    severity: "warning"

  - color: "#00FFFF"
    name: "Pure Cyan (#00FFFF)"
    reason: "Sci-fi-cliché cyan. ek uses #00D1FF (cyan.500) — biased slightly toward blue for a more refined, less Tron-cosplay register."
    severity: "warning"

  # Forbidden fonts
  - font_family: "Roboto"
    reason: "Generic Material-default font. Inter is the locked ek body face; Chakra Petch the display."
    severity: "error"
  - font_family: "Arial"
    reason: "System default — never use as display."
    severity: "error"
  - font_family: "Helvetica"
    reason: "Reads corporate / generic. Inter + Chakra Petch are the locked stack."
    severity: "error"
  - font_family: "system-ui"
    reason: "Inherits OS defaults — never use as display."
    severity: "error"
  - font_family: "Comic Sans MS"
    reason: "Obvious."
    severity: "error"
  - font_family: "Orbitron"
    reason: "Sci-fi cosplay font — too costume-y for production agentic UI. Chakra Petch reads cyber-coded without going full Tron."
    severity: "warning"
  - font_family: "Press Start 2P"
    reason: "8-bit pixel cosplay — wrong register for agentic productivity."
    severity: "warning"

  # Forbidden patterns
  - pattern: "drop-shadow-as-elevation"
    reason: "Cyberpunk elevation = neon edge glow (box-shadow with brand color), not gray drop shadow. See effects.neon_glow_*."
    severity: "warning"
  - pattern: "glassmorphism-heavy-blur"
    reason: "Heavy backdrop-blur reads as 2020-Apple, not cyberpunk. If you need a frosted surface, use 4-8px blur max plus subtle border-glow."
    severity: "warning"
  - pattern: "gradient-mesh-background"
    reason: "Iridescent / mesh-gradient backgrounds read as 2022 design template, not cyberpunk."
    severity: "warning"
  - pattern: "emoji-as-icon"
    reason: "Lucide SVG icons only. Emojis in UI chrome read as casual / consumer."
    severity: "error"
  - pattern: "lorem-ipsum"
    reason: "Use real content or honest placeholders."
    severity: "warning"
  - pattern: "rounded-card-with-colored-left-border"
    reason: "Overused B2B SaaS trope."
    severity: "warning"
  - pattern: "decorative-neon-glow"
    reason: "Neon edge glow is reserved for focus, hover, and the agent_status_active badge. Decorative glow everywhere = cyberpunk costume, not brand."
    severity: "warning"

  # ★ NEW v0.2 — finance/cockpit-specific avoidance
  - pattern: "decorative-glow-on-every-card"
    reason: "v0.2 Dark Ledger thesis: static finance panels stay sober (no glow by default). Only agentic elements (commands, active automation) emit neon-operator-layer glow. Glow on every card collapses the operator-vs-truth distinction."
    severity: "warning"
  - pattern: "full-screen-purple-pink-gradient"
    reason: "Synthwave / generic-AI tell. ek backgrounds are flat near-black with optional steel-violet atmospheric tint."
    severity: "error"
  - pattern: "chromatic-aberration"
    reason: "Cyberpunk-cosplay decoration. Reduces legibility; not production-appropriate for finance surfaces."
    severity: "warning"
  - pattern: "rain-effect-overlay"
    reason: "Blade Runner cosplay decoration. Not a brand motif."
    severity: "warning"
  - pattern: "cityscape-imagery"
    reason: "Cyberpunk-cosplay decoration. ek brand is the operator's console, not a Neo-Tokyo backdrop."
    severity: "warning"
  - pattern: "magenta-as-decorative-chart-series"
    reason: "Magenta = agentic command / automation only. Default chart hero is cyan.500 (trace). Magenta as chart fill suggests 'this series is being driven by an agent' — use chart_agentic_dark binding."
    severity: "warning"
  - pattern: "amber-as-decoration"
    reason: "Amber = warn / CFO attention / forecast uncertainty. Decorative amber dilutes the watch signal."
    severity: "warning"
  - pattern: "diagonal-cut-overuse"
    reason: "Diagonal-cut corners are an alt-to-rounded motif for hero/feature surfaces. Using them on every panel reads as Cyberpunk 2077 menu cosplay."
    severity: "warning"
  - pattern: "em-dash-in-copy"
    reason: "v0.2 voice rule. Use colon, parens, comma, or n-dash. Em-dashes read as 2024-LLM-output."
    severity: "info"

# ────────────────────────────────────────────────────────────────────
# INVARIANTS — Hard structural rules. ek-craft enforces.
# v0.2 adds 6 new finance/cockpit invariants.
# ────────────────────────────────────────────────────────────────────
invariants:
  # ─── v0.1 invariants (preserved) ───
  magenta_cta_monopoly:
    rule: "Magenta #FF2A6D (magenta.500) is the only primary-CTA color. No secondary may be used as a primary CTA fill."
    rationale: "Preserves the action signal across every ek surface. If cyan becomes a CTA too, the operator can't pre-attentively spot the action."
    severity: "error"
  cyan_secondary_and_info:
    rule: "Cyan #00D1FF (cyan.500) is restricted to secondary action, info, link, trace, terminal_inset text, and AA-bound chart series. NEVER a primary CTA fill."
    rationale: "Cyan competes hard with magenta for attention; reserving it for navigation (links), information (info badges), and lineage (trace) keeps the magenta CTA monopoly readable."
    severity: "error"
  lime_alive_and_success_only:
    rule: "Lime #A6FF00 (lime.500) appears ONLY in status_success_*, agent_status_active, agent_complete, finance_cash, finance_arr, data_live, gain roles. Never decorative."
    rationale: "Lime carries multi-bound semantic load (success + alive + health + gain). If it leaks into decoration, the operator can no longer trust 'green = working / healthy / favorable.'"
    severity: "error"
  red_error_only:
    rule: "Red #FF003C (red.500) appears ONLY in status_error_*, destructive_action, agent_error, agent_risk, data_failed, finance loss/breach roles. Never decorative, never in chart series."
    rationale: "Semantic-locked statuses are non-negotiable. Red on this brand means 'something materially broke or is at material risk.'"
    severity: "error"
  amber_warn_only:
    rule: "Amber #FFB800 (amber.500) appears ONLY in status_warn_*, agent_blocked, agent_attention, agent_approval_required, data_stale, finance_runway / forecast_variance roles."
    rationale: "Amber = CFO attention / watch state. Decorative amber dilutes the watch signal and trains the operator to ignore real attention prompts."
    severity: "error"
  mono_for_identifiers:
    rule: "JetBrains Mono is required for code, file paths, IDs, timestamps, model names, hashes, token counts, period codes, source-system names, and any other machine-generated identifier."
    rationale: "Agentic + finance UI is operator-facing; the operator scans identifiers constantly. Mono preserves alignment, prevents I/l/1 confusion, and visually separates 'machine output' from 'product chrome.' Single biggest UX win in operator interfaces."
    severity: "error"
  no_consumer_indigo_purple:
    rule: "Tailwind-indigo #6366F1 and consumer-violet #8B5CF6 / #A78BFA are forbidden. ek's atmospheric purple-blue is steel_violet.500 #3B3B92 (darker, more blue-violet)."
    rationale: "Indigo-500 is the single most-overused color in 2024-2026 AI products. Defaulting to it instantly reads as 'AI-template starter' rather than brand."
    severity: "error"
  dark_primary_register:
    rule: "Surfaces app + cockpit + marketing default to dark mode (background #070711). Light mode is opt-in only (print, accessibility override)."
    rationale: "The neon palette reads correctly on near-black; on light it's anemic. Dark-default is also the agentic-UI norm and the finance-cockpit norm (Bloomberg-style)."
    severity: "warning"
  reduced_motion_required:
    rule: "Any animation (transitions, pulses, scanline overlay) must include an @media (prefers-reduced-motion: reduce) override that disables or substantially reduces motion."
    rationale: "Accessibility baseline. Scanline overlay especially can trigger vestibular issues."
    severity: "error"

  # ─── ★ v0.2 NEW INVARIANTS — Dark Ledger / Neon Operator locks ───

  finance_directionality_locked:
    rule: "The finance.* primitives (gain #4ADE80, loss #F87171, watch #FBBF24, info_blue #60A5FA) appear ONLY in variance, delta, financial directionality, and data freshness contexts. Never as brand accent, never as decorative chart color, never as a button background."
    rationale: "Dark Ledger thesis: finance directionality is a semantic load-bearing signal. Operator scanning a P&L must trust that green = favorable, red = unfavorable, amber = watch — without ambiguity from decorative reuse. Adopted from Bloomberg's variance-color discipline."
    severity: "error"

  agent_command_magenta_only:
    rule: "Magenta is the agentic command / action / automation color. Used in CTAs, agent_command_active state, executive command bars, approval-required affordances, manual-override indicators. NEVER as nightclub-decorative neon, NEVER on a chart series that isn't agentic, NEVER as a brand-accent pink."
    rationale: "Reframes v0.1's CTA monopoly with a sharper semantic: magenta = 'an agent is doing something or you are commanding one.' If magenta means anything else (chart fill, decoration, hover-glow-on-passive-card), the operator can't trust the command signal."
    severity: "error"

  cyan_for_trace_only:
    rule: "Cyan is the inspectability / trace / lineage / drill-through color. Used for source labels, trace rails, drill-through arrows, info, link, terminal output. NEVER as a primary CTA, NEVER as a decorative accent, NEVER as a brand-accent neon."
    rationale: "Dark Ledger thesis: cyan answers 'where did this number come from?' If cyan also means CTA or accent, the operator can't trust the inspectability signal. Cyan is the 'show your work' color."
    severity: "error"

  tabular_numerals_for_finance:
    rule: "All finance numerics (KPI values, table cells, variance %, delta, currency amounts, percentages) must use JetBrains Mono with `font-feature-settings: \"tnum\"` (or equivalent OpenType `tnum` flag). Proportional numerals are forbidden in finance contexts."
    rationale: "Finance data is scanned in columns. Proportional numerals misalign across rows and across rows-with-different-magnitudes, which makes variance scanning slower and bug-prone. Tabular numerals lock column alignment. Bloomberg, FactSet, every serious finance UI uses tabular."
    severity: "error"

  no_em_dashes_in_copy:
    rule: "Em-dashes (— U+2014) are forbidden in brand copy, UI copy, and component labels. Use colon, parentheses, comma, or n-dash (–) where appropriate."
    rationale: "Em-dashes are a 2024-LLM-output tell. ek voice is operator-respecting and terse; em-dashes signal generated prose. n-dashes for numeric ranges remain fine."
    severity: "info"

  board_safe_export_mode:
    rule: "When the body has class `board-safe` (PDF export, board screenshot, investor-deck asset), all effects.neon_glow_* must collapse to effects.board_safe_neon_glow_* (inset 1px border, no outer glow), all scanline overlays must be removed, and all animations must be paused. Focus-ring stays visible for accessibility."
    rationale: "Board materials should let the data lead. Neon glow that's a feature in the live cockpit becomes noise in a PDF screenshot embedded in an IC memo. Board-safe mode is the export-pressure-valve so the cyberpunk register doesn't need to be diluted for live ops."
    severity: "warning"
