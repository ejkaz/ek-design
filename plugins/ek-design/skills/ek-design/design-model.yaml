  button_primary:
    background:  "{magenta.500}"
    color:       "{neutral.0}"
    padding:     "10px 20px"
    radius:      "{radii.control}"
    font_family: "Chakra Petch"
    font_weight: 600
    font_size:   "0.9375rem"
    letter_spacing: "0.020em"
