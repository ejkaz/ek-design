# ════════════════════════════════════════════════════════════════════
# ek-design — Brand SSoT for Eric Kazmaier's personal agentic UI
# Neo-Tokyo cyberpunk register · Dark Ledger / Neon Operator thesis
# Read by ek-web, ek-craft (ek-review backlog). Updated via ek-design.
# ════════════════════════════════════════════════════════════════════

meta:
  version: "0.2.0"
  brand_version: "ek-2026-Q4-v1"
  source: |
    v0.2.0 ratified 2026-05-24. Evolves v0.1.0 (ek-2026-Q3-v1) around the
    "Dark Ledger / Neon Operator" thesis: static finance truth lives in
    sober dark surfaces; the agent layer emits signal. Adds finance
    directionality colors (gain/loss/watch/info-blue), agentic role
    semantics (command/trace/attention/health/risk), 8 finance-oriented
    motifs, 10 cockpit components, and 6 new invariants that lock the
    semantic boundaries (magenta = command not decoration, cyan = trace
    not decoration, amber = attention not failure).
  updated: "2026-05-24"
  updated_by: "eric@parspec.io"
  status: "ratified"
  ratified: "2026-05-24"
  ratified_by: "eric@parspec.io"
  supersedes: "0.1.0"
  notes: |
    v0.1.0 — Founding (ek-2026-Q3-v1). Neo-Tokyo neon palette, magenta CTA
    monopoly, electric cyan secondary, acid lime alive/success on deep
    blue-black (#0A0A14). Chakra Petch / Inter / JetBrains Mono. 7
    invariants.

    v0.2.0 — Dark Ledger / Neon Operator (ek-2026-Q4-v1). Tighter brand
    thesis aimed at agentic finance cockpits and the broader operator-
    facing surface area cepsra is growing into (Obsidian hub for projects
    + FinanceOS for QuickBooks / forecasting / burn / unit economics /
    headcount). Reframes existing colors with sharper semantic locks AND
    adds new surface architecture for finance density. The base palette
    is preserved; consumers re-export to pick up the violet-undertone
    surface shift and finance role tokens.

    Major changes from v0.1.0:
      - SURFACES: background undertone shifted from `#0A0A14` (pure
        blue-black) to `#070711` (deeper violet-black). Layered surfaces
        also re-tuned: panel `#15151F` → `#171727` (surface_2), with new
        surface_1 `#10101A` and surface_3 `#23233A` slots. Border default
        `#2E2E40` → `#2C2A45` (steel-violet-tinted). Background reads as
        "finance ledger black with violet atmospheric undertone."
      - PRIMITIVES: added `finance:` family — semantic directionality
        colors distinct from agent state. gain (#4ADE80) / loss (#F87171)
        / watch (#FBBF24) / info_blue (#60A5FA). Used only for variance,
        delta, financial health — never as brand accent or chart color
        when the series isn't financially-directional.
      - ROLES: added 4 new role groups —
          `agent.*` (command, trace, attention, complete, risk, idle) —
            tightens v0.1's agent_status_* with stronger semantic locks
          `finance.*` (cash, runway, burn, arr, gross_margin,
            forecast_variance, budget_variance, headcount_plan,
            aws_ai_cogs) — semantic matrix for FinanceOS surfaces
          `data.*` (live, synced, stale, failed, manual_override) —
            data freshness / sync state
          `trace.*` (rail, source, breadcrumb, drill_through) — cyan
            lineage / inspectability
      - MOTIFS: added 8 finance-oriented motifs (dark-ledger-panel,
        neon-operator-layer, trace-rail, agent-event-feed,
        forecast-confidence-halo, board-safe-mode, executive-command-state,
        machine-identifier-strip). v0.1 motifs preserved.
      - COMPONENTS: added 10 finance cockpit components (kpi_card,
        finance_panel, agent_command_bar, agent_status_badge expanded,
        data_freshness_badge, source_trace_row, variance_row,
        approval_card, agent_log, board_export_preview).
      - TYPOGRAPHY: added `modes` block documenting two contexts —
        brand_portal (Chakra Petch headers + Inter body) and
        cockpit (mono-forward density). Families stay locked; cockpit
        mode adds optional Geist + Geist Mono alternatives. New rule:
        finance numerics must use tabular numerals (`font-feature-settings:
        "tnum"`).
      - VOICE: added no-em-dashes rule (use colon, parens, comma, n-dash).
      - INVARIANTS: 6 new — finance_directionality_locked,
        agent_command_magenta_only, cyan_for_trace_only,
        tabular_numerals_for_finance, no_em_dashes_in_copy,
        board_safe_export_mode.
      - AVOID list expanded — full-screen purple/pink gradients,
        decorative glow on every card, chromatic aberration / rain /
        cityscape imagery, magenta as decorative chart series.

    Thesis statement (the v0.2 contract):
      "The ledger is dark. The agents are luminous."

      Static finance truth: sober dark panels, minimal glow, dense.
      Data lineage / inspectability: cyan.
      Agentic execution / command / automation: magenta.
      CFO attention / watch / forecast uncertainty: amber.
      Health / reconciliation / completion: lime.
      True risk / sync failure / covenant breach / runway breach: red.
      Atmosphere / depth: steel-violet (rarely text).

    This is NOT synthwave, NOT a Bloomberg clone, NOT decorative cyberpunk.
    It is "a Bloomberg Terminal from 2032, rebuilt by an autonomous CFO
    agent in Neo-Tokyo."

# ────────────────────────────────────────────────────────────────────
# IDENTITY
# ────────────────────────────────────────────────────────────────────
name: "ek-design"
description: "Personal cyberpunk brand for Eric Kazmaier's agentic UI — finance cockpit and project hub surfaces"
thesis: "Dark Ledger / Neon Operator"
thesis_one_line: "The finance ledger stays dark; the agent layer emits signal."
philosophy: |
  Operator-facing software register pulled from the visual vocabulary of
  Neo-Tokyo cinema (Blade Runner 2049, Ghost in the Shell) and real
  Tokyo-after-dark neon, tightened around an agentic finance cockpit
  thesis: "Dark Ledger / Neon Operator."

  The static finance truth layer is dark and sober. The data lineage
  layer is cyan. The agentic execution layer is magenta. The CFO
  attention layer is amber. The health/reconciliation layer is lime.
  The risk layer is red. Steel-violet is atmospheric depth only —
  rarely text.

  Built for two concurrent purposes:
    1. Obsidian hub for project management (cepsra side)
    2. FinanceOS — agentic finance control plane connecting QuickBooks,
       forecasting, burn analysis, headcount, AWS/AI unit economics

  JetBrains Mono carries every identifier (model name, agent ID,
  timestamp, file path, token count, hash, period, source freshness).
  Tabular numerals carry every finance number.

  Eric is always the operator; the UI is always one of his agents.
product_metaphor:
  - "CFO cockpit"
  - "Autonomous finance control plane"
  - "Operator console"
  - "Agentic FP&A command center"
  - "Project hub (Obsidian-adjacent)"
what_this_is_not:
  - "Not synthwave (no nostalgic sunset gradients)"
  - "Not generic AI SaaS (no consumer-purple, no Tailwind indigo)"
  - "Not nightclub neon (no decorative glow on every card)"
  - "Not a Bloomberg clone (no green-on-black phosphor cosplay)"
  - "Not decorative cyberpunk (no chromatic aberration, no rain, no cityscape imagery)"
  - "Not Cyberpunk 2077 costume (no Orbitron, no Press Start 2P, no diagonal-cuts-everywhere)"
primary_mode: "dark"
brand_source: "Neo-Tokyo cinema visual reference + production agentic-UI requirements + Dark Ledger / Neon Operator thesis (v0.2)"
brand_domain: "Personal agentic productivity — project hub + FinanceOS cockpit"
brand_type: "ui-rich"
mono_for_code: true
mono_for_metrics: true
mono_for_identifiers: true
mono_for_finance_numerics: true   # NEW v0.2 — finance numerics in mono with tabular numerals

# ────────────────────────────────────────────────────────────────────
# PRIMARY AXIS — LOCKED. Never modify without explicit override.
# ek-craft enforces these as required tokens.
# ────────────────────────────────────────────────────────────────────
primary_axis_preserved:
  description: |
    The immovable anchors of the ek-design brand. Any palette evolution
    may change tints, atmospheric secondaries, motifs, or motion — but
    never these.
  background:          "#070711"   # Deeper violet-black (shifted v0.2 from #0A0A14)
  panel:               "#171727"   # Surface_2 finance panel (shifted v0.2 from #15151F)
  off_white:           "#F0F0F5"   # Inverted (light-mode opt-in)
  white:               "#FFFFFF"
  magenta_command:     "#FF2A6D"   # Primary CTA + agentic command monopoly
  cyan_trace:          "#00D1FF"   # Trace / lineage / inspectability / secondary action
  lime_health:         "#A6FF00"   # Success + completion + agent active
  typography_display:  "Chakra Petch"
  typography_body:     "Inter"
  typography_mono:     "JetBrains Mono"
  motifs:
    # v0.1.0 motifs (preserved)
    - "neon-edge-glow"           # CSS box-shadow on focus/active surfaces — narrow role
    - "terminal-block-inset"     # Mono content on cyan-bordered black recess
    - "katakana-numeric-id"      # Agent / job IDs styled with monospace + leading zeros
    - "scanline-overlay"         # Optional, reduced-motion-safe horizontal CRT lines on hero
    - "diagonal-cut-corner"      # Alternative to rounded corners; use sparingly
    # v0.2.0 finance motifs (new)
    - "dark-ledger-panel"        # Sober finance panel, low-contrast border, minimal glow, dense
    - "neon-operator-layer"      # Thin luminous layer for active agents / commands / approvals
    - "trace-rail"               # Cyan micro-lines, source breadcrumbs, drill-through paths
    - "agent-event-feed"         # Timestamped feed of tool calls / sync events / approvals
    - "forecast-confidence-halo" # Subtle border / inline confidence indicator
    - "board-safe-mode"          # Same dark system, reduced neon (PDF / board export)
    - "executive-command-state"  # Magenta command button/bar — "Run forecast", "Approve", etc.
    - "machine-identifier-strip" # Agent IDs / model version / source freshness in mono

# ────────────────────────────────────────────────────────────────────
# SURFACES — Mode-per-surface bindings
# v0.2 adds board_safe + cockpit as distinct surface contexts.
# ────────────────────────────────────────────────────────────────────
surfaces:
  app:
    mode: dark
    examples: [app-shell, dashboard, agent-console, task-list, briefing-view, chat-panel]
    background: "{neutral.950}"        # #070711
    text_primary: "{neutral.0}"
    rationale: |
      cepsra app surface defaults to dark. Reduces eye strain during long
      operator sessions; neon accents read vividly on near-black; mono
      identifiers maintain phosphor-CRT legibility. All major agentic UI
      references (Claude desktop, ChatGPT desktop, Cursor, Linear dark)
      are dark-default.
  cockpit:
    mode: dark
    examples: [finance-cockpit, fp&a-dashboard, runway-view, burn-analysis, headcount-plan, board-pack, forecast-vs-actuals]
    background: "{neutral.950}"        # #070711
    text_primary: "{neutral.0}"
    rationale: |
      FinanceOS surfaces. Same dark register as `app` but density expectation
      is higher — KPI strips, dense tables, source-trace rails, agent event
      feeds. Inherits `dark-ledger-panel` motif as default chrome. Cockpit
      content is sober; agentic elements (commands, approvals, automation)
      are the only places that emit `neon-operator-layer` glow.
  marketing:
    mode: dark
    examples: [landing-page, hero-sections, feature-grid, pricing, docs-homepage]
    background: "{neutral.950}"        # #070711
    text_primary: "{neutral.0}"
    rationale: |
      Marketing site sits in the same dark register as the app so
      brand-to-app transition is seamless. Cyberpunk register reads
      as "for operators" — self-selects the right audience.
  board_safe:
    mode: dark
    examples: [pdf-export, board-screenshot, investor-update-export, partner-deck-asset]
    background: "{neutral.950}"        # #070711
    text_primary: "{neutral.0}"
    rationale: |
      Same dark system but reduced neon — no scanlines, no decorative
      glow, focus-and-state glow only. Suitable for PDF exports and
      board screenshots where the cyberpunk register should sit beneath
      the data, not on top. Activated by a `.board-safe` body class
      that overrides effects.* tokens (see effects.board_safe_*).
  light:
    mode: light
    examples: [print-views, accessibility-mode]
    background: "{neutral.50}"         # #F0F0F5
    text_primary: "{neutral.950}"
    rationale: |
      Opt-in inverted mode for print and accessibility override. Rare.
      Same primary axis; only mode bindings differ.
  terminal_inset:
    mode: dark
    examples: [code-block, agent-log, command-output, jsonl-stream, token-debug, model-diff, sync-trace]
    background: "{neutral.1000}"       # #000000
    text_primary: "{cyan.500}"
    border: "1px solid {cyan.700}"
    rationale: |
      The "console window inside the app" wedge. Pure-black ground +
      cyan border + JetBrains Mono content. Agentic UIs need a visually-
      distinct surface for raw machine output (logs, tool calls, JSON
      streams, sync traces, model diffs) — this is it. Use sparingly;
      not every dense surface needs terminal styling.

# ────────────────────────────────────────────────────────────────────
# PRIMITIVES — Raw scales
# v0.2 shifts neutral dark stops to violet-undertone; adds finance family.
# ────────────────────────────────────────────────────────────────────
primitives:
  colors:
    # Neutral ramp — cool/violet-biased (v0.2 dark stops re-tuned).
    # Light stops unchanged. Dark stops carry deeper violet undertone
    # for "finance ledger" register vs v0.1's pure blue-black.
    neutral:
      0:    "#FFFFFF"
      50:   "#F0F0F5"   # Off-white (cool) — inverted/light bg
      100:  "#E0E0EA"
      200:  "#C8C8D6"
      300:  "#A8A8BC"
      400:  "#7A7A92"
      500:  "#5C5C70"
      600:  "#3F3F50"
      700:  "#2C2A45"   # ★ v0.2 — border default (was #2E2E40); steel-violet-tinted
      800:  "#23233A"   # ★ v0.2 — surface_3 elevated (was #1F1F2A)
      850:  "#171727"   # ★ v0.2 — surface_2 panel (was #15151F)
      900:  "#10101A"   # ★ v0.2 — surface_1 (was #0F0F18)
      950:  "#070711"   # ★ v0.2 — background, deeper violet-black (was #0A0A14)
      1000: "#000000"   # Pure black — terminal_inset only

    # Magenta — primary action / agentic command monopoly. Cyberpunk
    # pink anchor. v0.2 re-frames: magenta is COMMAND, not nightclub.
    magenta:
      50:   "#FFE5EF"
      100:  "#FFCCDF"
      200:  "#FF99BF"
      300:  "#FF7BAA"
      400:  "#FF4D8C"
      500:  "#FF2A6D"   # ★ LOCKED — Primary action + agentic command
      600:  "#E11D5F"   # CTA hover / command-active
      700:  "#B0144A"   # CTA active (press)
      800:  "#7A0E33"   # accent_type_on_light — AA-safe (8.27:1)
      900:  "#4F0820"

    # Cyan — TRACE / lineage / inspectability / secondary action.
    # v0.2 sharpens semantic: cyan = "where did this number come from?"
    # NOT decorative.
    cyan:
      50:   "#E0FAFF"
      100:  "#B8F3FF"
      200:  "#80EAFF"
      300:  "#5EEAFF"
      400:  "#2DD9FF"
      500:  "#00D1FF"   # ★ ANCHOR — Trace, secondary, info, link
      600:  "#00A3CC"
      700:  "#0090B8"   # info_on_light — AA at 4.51:1 on off-white
      800:  "#005F77"
      900:  "#003344"

    # Lime — HEALTH / reconciliation / completion / agent active.
    # Locked invariant: never decorative.
    lime:
      50:   "#F2FFCC"
      100:  "#E5FF99"
      200:  "#D2FF66"
      300:  "#C8FF40"
      400:  "#B3FF1A"
      500:  "#A6FF00"   # ★ ANCHOR — Success, agent active, reconciled
      600:  "#86CC00"
      700:  "#6B9E00"   # success_on_light — AA at 3.18:1 (large only)
      800:  "#4A6E00"   # success_on_light_normal — AA 5.81:1
      900:  "#2A3F00"

    # Steel-violet — ATMOSPHERIC depth only. Rarely text. v0.2 sharpens:
    # used for inactive-machine-state, deep-field marketing glow, subtle
    # borders. NOT a brand accent. NOT a CTA.
    steel_violet:
      300:  "#6B6BC4"
      500:  "#3B3B92"   # secondary atmospheric accent
      700:  "#1E1E60"
      900:  "#0F0F33"   # deep-field hero glow / background depth

    # Slate — cool-neutral utility. NOT a brand color.
    slate:
      50:   "#F2F2F7"
      100:  "#E0E0E8"
      300:  "#9999B0"   # body_chrome_on_dark
      500:  "#5C5C70"
      700:  "#2E2E40"
      900:  "#15151F"

    # Status — semantic-locked. Narrow role bindings.
    red:
      500:  "#FF003C"   # ★ ANCHOR — error / destructive / true risk only
      600:  "#CC0030"
      700:  "#B0142D"   # error_on_light — AA 5.43:1

    amber:
      500:  "#FFB800"   # ★ ANCHOR — warn / CFO attention / watch state
      600:  "#CC9300"
      700:  "#8C6500"   # warn_on_light — AA 6.84:1

    # ★ NEW v0.2 — FINANCE DIRECTIONALITY family.
    # Semantic-distinct from agent state. Used ONLY for variance, delta,
    # financial health indicators. Locked invariant
    # `finance_directionality_locked` enforces narrow role.
    finance:
      gain:      "#4ADE80"   # Positive variance / favorable delta / under budget / on target
      loss:      "#F87171"   # Negative variance / unfavorable delta / over budget / miss
      watch:     "#FBBF24"   # Forecast uncertainty / approaching threshold / stale data
      info_blue: "#60A5FA"   # Neutral info accent — does NOT compete with cyan (trace)
                             # Use for: model version, environment metadata, calm informational
                             # NEVER as link or drill-through (that's cyan).

  spacing: [0, 2, 4, 8, 12, 16, 24, 32, 48, 64, 96, 128, 192]
  radii:   [0, 2, 4, 6, 8, 12, 999]
  cuts:    [0, 4, 8, 12, 16]

# ────────────────────────────────────────────────────────────────────
# ROLES — Two-tier token model
# Every role token references EXACTLY ONE primitive.
# v0.2 adds agent.*, finance.*, data.*, trace.* role groups.
# ────────────────────────────────────────────────────────────────────
roles:

  # ─── Action verbs (CTA + agentic command monopoly enforced) ───
  cta:                       "{magenta.500}"
  cta_hover:                 "{magenta.600}"
  cta_active:                "{magenta.700}"
  cta_text:                  "{neutral.0}"

  # ─── Secondary action / info / link ───
  secondary_action:          "{cyan.500}"
  secondary_action_hover:    "{cyan.400}"
  link_on_dark:              "{cyan.500}"
  link_on_light:             "{cyan.700}"
  info_on_dark:              "{cyan.500}"
  info_on_light:             "{cyan.700}"

  # ─── Magenta-as-type (mode-aware AA) ───
  accent_type_on_dark:       "{magenta.500}"   # 5.18:1 on background — AA
  accent_type_on_light:      "{magenta.800}"   # 8.27:1 on off-white — AAA

  # ─── Status — semantic-locked ───
  status_error_on_dark:      "{red.500}"
  status_error_on_light:     "{red.700}"
  status_warn_on_dark:       "{amber.500}"
  status_warn_on_light:      "{amber.700}"
  status_success_on_dark:    "{lime.500}"
  status_success_on_light:   "{lime.800}"
  destructive_action:        "{red.500}"

  # ─── ★ v0.2 AGENT — tightened semantic roles for the operator layer ───
  # Magenta = command (the agent is acting). Cyan = trace (the agent is
  # showing its work). Amber = attention (the agent needs your input).
  # Lime = complete (the agent finished). Red = risk (the agent failed
  # in a way that matters). Slate = idle.
  agent_command:             "{magenta.500}"        # "Run forecast" / "Approve" / executing
  agent_command_active:      "{magenta.500}"        # actively running (paired with neon-glow)
  agent_trace:               "{cyan.500}"           # showing source / drill-through / lineage
  agent_thinking:            "{cyan.500}"           # model generating (paired with pulse)
  agent_tool_use:            "{steel_violet.300}"   # tool call in progress (inactive-machine)
  agent_attention:           "{amber.500}"          # awaiting input / approval / decision
  agent_blocked:             "{amber.500}"          # blocked on user
  agent_complete:            "{lime.500}"           # finished successfully
  agent_success:             "{lime.500}"
  agent_risk:                "{red.500}"            # failed / destructive / material risk
  agent_error:               "{red.500}"
  agent_status_active:       "{lime.500}"           # alive indicator (always-on agents)
  agent_status_idle:         "{slate.500}"          # inactive / off / paused

  # ─── ★ v0.2 FINANCE DIRECTIONALITY — locked semantic matrix ───
  # Use ONLY for variance, delta, financial health. NEVER decorative.
  finance_gain:              "{finance.gain}"       # positive variance / favorable
  finance_loss:              "{finance.loss}"       # negative variance / unfavorable
  finance_watch:             "{finance.watch}"      # approaching threshold / uncertain
  finance_neutral:           "{neutral.300}"        # no change / inline-flat
  finance_info:              "{finance.info_blue}"  # calm informational (model ver, env, etc.)

  # ─── ★ v0.2 FINANCE SEMANTIC MATRIX — cockpit role bindings ───
  # Domain-meaning role tokens that reference base roles. Lets cockpit
  # components reach for "the cash color" rather than "the lime color"
  # so future palette evolution can re-bind without component changes.
  finance_cash:              "{lime.500}"           # healthy cash position
  finance_runway:            "{amber.500}"          # runway = watch by default
  finance_burn:              "{finance.loss}"       # burn = negative directionality
  finance_arr:               "{lime.500}"           # ARR growth healthy
  finance_gross_margin:      "{cyan.500}"           # GM is an inspectability metric (trace)
  finance_forecast_variance: "{finance.watch}"      # variance = watch by default
  finance_budget_variance:   "{finance.watch}"
  finance_headcount_plan:    "{steel_violet.300}"   # headcount = atmospheric-machine
  finance_aws_ai_cogs:       "{steel_violet.300}"   # infra/AI COGS = atmospheric-machine
  finance_approval_required: "{magenta.500}"        # approval-required = command-needed

  # ─── ★ v0.2 DATA FRESHNESS — sync state semantics ───
  data_live:                 "{lime.500}"           # live / sub-minute fresh
  data_synced:               "{cyan.500}"           # recently synced (within sync interval)
  data_stale:                "{amber.500}"          # past freshness threshold
  data_failed:               "{red.500}"            # last sync failed
  data_manual_override:      "{magenta.500}"        # human override active

  # ─── ★ v0.2 TRACE — cyan inspectability monopoly ───
  trace_rail:                "{cyan.500}"           # the cyan micro-line itself
  trace_source:              "{cyan.500}"           # source-system label
  trace_breadcrumb:          "{cyan.300}"           # softer cyan for crumb chain
  trace_drill_through:       "{cyan.500}"           # clickable drill-through affordance
  trace_lineage:             "{cyan.500}"

  # ─── Cool-neutral utility — slate ───
  body_chrome_on_dark:       "{slate.300}"
  body_chrome_on_light:      "{slate.500}"
  border_neutral_dark:       "{slate.700}"
  border_neutral_light:      "{slate.100}"

  # ─── Surface tokens — keyed to surfaces.* mode bindings ───
  surface_app:               "{neutral.950}"        # #070711
  surface_cockpit:           "{neutral.950}"        # same as app
  surface_panel:             "{neutral.850}"        # #171727 — finance panel (default chrome)
  surface_panel_alt:         "{neutral.800}"        # #23233A — surface_3 / nested / selected
  surface_panel_subtle:      "{neutral.900}"        # #10101A — surface_1 / topbar
  surface_marketing:         "{neutral.950}"
  surface_light:             "{neutral.50}"
  surface_terminal:          "{neutral.1000}"
  surface_terminal_border:   "{cyan.700}"
  surface_board_safe:        "{neutral.950}"

  # ─── Text tokens — split by mode ───
  text_dark_primary:         "{neutral.0}"
  text_dark_secondary:       "{neutral.300}"
  text_dark_tertiary:        "{neutral.500}"
  text_light_primary:        "{neutral.950}"
  text_light_secondary:      "{neutral.700}"
  text_light_tertiary:       "{neutral.500}"
  text_mono_default:         "{neutral.0}"
  text_mono_accent:          "{cyan.500}"
  text_mono_dim:             "{neutral.300}"          # ★ v0.2 — for finance numerics secondary

  # ─── Borders ───
  border_dark:               "{neutral.700}"          # ★ v0.2 — #2C2A45 (steel-violet tinted)
  border_soft:               "{neutral.800}"          # ★ v0.2 — subtle structural boundary
  border_light:              "{slate.100}"
  border_active:             "{magenta.500}"          # ★ v0.2 — selected/active panel edge
  border_focus:              "{magenta.500}"
  border_focus_secondary:    "{cyan.500}"

  # ─── Chart series — pre-built per-mode recipes ───
