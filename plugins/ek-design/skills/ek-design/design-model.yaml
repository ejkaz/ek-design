    confidence_halo_amber: "inset 0 0 0 1px {amber.500}80"
    confidence_halo_red:   "inset 0 0 0 1px {red.500}80"
    trace_rail_glow_cyan:  "0 0 4px {cyan.500}80"
    operator_layer_glow:   "0 0 12px {magenta.500}60, 0 0 24px {magenta.500}30"

