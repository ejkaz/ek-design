  chart_1_dark: "{cyan.500}"          # Hero series — trace / primary metric
  chart_2_dark: "{lime.500}"          # Health / completion
  chart_3_dark: "{amber.500}"         # Watch / attention
  chart_4_dark: "{steel_violet.300}"  # Atmospheric mid (machine state)
  chart_5_dark: "{finance.info_blue}" # Calm informational
  chart_6_dark: "{slate.300}"         # Neutral
  chart_agentic_dark: "{magenta.500}" # ★ v0.2 — ONLY for agentic/automation series

  chart_1_light: "{cyan.700}"
  chart_2_light: "{lime.800}"
  chart_3_light: "{amber.700}"
  chart_4_light: "{steel_violet.700}"
  chart_5_light: "{finance.info_blue}"
  chart_6_light: "{slate.500}"
  chart_agentic_light: "{magenta.700}"

