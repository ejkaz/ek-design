    hover:       { background: "{magenta.600}", box_shadow: "{effects.neon_glow_magenta}" }
    active:      { background: "{magenta.700}" }
    focus:       { outline: "none", box_shadow: "{effects.focus_ring_magenta}" }

  button_secondary:
    background:  "transparent"
    color:       "{cyan.500}"
    border:      "1px solid {cyan.500}"
    padding:     "10px 20px"
    radius:      "{radii.control}"
    font_family: "Chakra Petch"
    font_weight: 600
    font_size:   "0.9375rem"
    letter_spacing: "0.020em"
    hover:       { background: "{cyan.500}10", color: "{cyan.400}" }
    focus:       { outline: "none", box_shadow: "{effects.focus_ring_cyan}" }

  card:
    background: "{neutral.850}"
    color:      "{neutral.0}"
    border:     "1px solid {neutral.700}"
    radius:     "{radii.component}"
    padding:    "{spacing.lg}"

  terminal_block:
    background:  "{neutral.1000}"
    color:       "{cyan.500}"
    border:      "1px solid {cyan.700}"
    radius:      "{radii.element}"
    padding:     "{spacing.md}"
    font_family: "JetBrains Mono"
    font_size:   "0.8125rem"
