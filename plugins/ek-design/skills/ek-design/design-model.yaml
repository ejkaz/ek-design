  effects:
    # Cyberpunk neon glows — narrow role bindings. Decorative use violates
    # `magenta_cta_monopoly`, `cyan_for_trace_only`, etc.
    neon_glow_magenta: "0 0 8px {magenta.500}, 0 0 16px {magenta.500}40"
    neon_glow_cyan:    "0 0 8px {cyan.500}, 0 0 16px {cyan.500}40"
    neon_glow_lime:    "0 0 6px {lime.500}, 0 0 12px {lime.500}40"
    focus_ring_magenta: "0 0 0 2px {neutral.950}, 0 0 0 4px {magenta.500}"
    focus_ring_cyan:    "0 0 0 2px {neutral.950}, 0 0 0 4px {cyan.500}"
    panel_lift:         "0 1px 0 0 {neutral.700}, 0 8px 24px -8px #00000080"
    scanline_overlay:   "repeating-linear-gradient(0deg, transparent 0, transparent 2px, {neutral.0}06 2px, {neutral.0}06 3px)"

    # ★ v0.2 — finance-specific subtle glows. Confidence halos, trace
