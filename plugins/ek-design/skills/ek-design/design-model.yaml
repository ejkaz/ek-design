  code_block:
    background: "{neutral.900}"
    color:      "{neutral.0}"
    border:     "1px solid {neutral.700}"
    radius:     "{radii.component}"
    padding:    "{spacing.md}"
    font_family: "JetBrains Mono"
    syntax_accent: "{cyan.500}"

  input_field:
    background: "{neutral.850}"
    color:      "{neutral.0}"
    border:     "1px solid {neutral.700}"
    radius:     "{radii.control}"
    padding:    "10px 12px"
    font_family: "Inter"
    placeholder_color: "{neutral.500}"
    focus:      { border_color: "{cyan.500}", box_shadow: "{effects.focus_ring_cyan}" }

  # ─── ★ v0.2 finance cockpit components ───

  kpi_card:
    purpose: "Hero metric tile — label + value + delta + state + optional sparkline"
    background: "{neutral.850}"
    border:     "1px solid {neutral.700}"
    radius:     "{radii.component}"
    padding:    "{spacing.md}"
    label:      { type: "kpi_label" }
    value:      { type: "kpi_value" }
    delta:      { type: "delta", color_gain: "{finance.gain}", color_loss: "{finance.loss}", color_neutral: "{neutral.500}" }
    state:      { healthy: "{lime.500}", watch: "{amber.500}", breach: "{red.500}", agent_active: "{magenta.500}" }
    sparkline_height: "32px"
    tabular_numerals: true

  finance_panel:
